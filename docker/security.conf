# =====================================================================
# Nginx security headers + common defenses
# =====================================================================

# Only advertise what we serve.
add_header X-Content-Type-Options        "nosniff"                          always;
add_header X-Frame-Options               "DENY"                             always;
add_header Referrer-Policy               "strict-origin-when-cross-origin"  always;
add_header Permissions-Policy            "geolocation=(), microphone=(), camera=(), payment=()" always;
add_header Cross-Origin-Opener-Policy    "same-origin"                      always;
add_header Cross-Origin-Resource-Policy  "same-site"                        always;

# Content Security Policy - restrict resource loading
add_header Content-Security-Policy       "default-src 'self'; script-src 'self'; style-src 'self' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

# HSTS - enforce HTTPS (enable when TLS is configured)
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Only let the app's verbs through at the edge.
if ($request_method !~ ^(GET|POST|OPTIONS|HEAD)$) {
    return 405;
}
