# =====================================================================
# Shared FastCGI settings for PHP endpoints
# =====================================================================
include /etc/nginx/fastcgi_params;

fastcgi_pass                php_fpm;
fastcgi_index               index.php;
fastcgi_keep_conn           on;

fastcgi_split_path_info     ^(.+\.php)(/.+)$;
fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
fastcgi_param  PATH_INFO        $fastcgi_path_info;

# --- Forward the real client identity to PHP --------------------------
# nginx is the only hop in front of PHP, so we can trust these vars.
fastcgi_param  REMOTE_ADDR        $remote_addr;
fastcgi_param  HTTP_X_REAL_IP     $remote_addr;
fastcgi_param  HTTP_X_FORWARDED_FOR   $proxy_add_x_forwarded_for;
fastcgi_param  HTTP_X_FORWARDED_PROTO $scheme;
fastcgi_param  HTTP_X_FORWARDED_HOST  $host;

# --- Timeouts: uploads / streams can be long on LAN --------------------
fastcgi_connect_timeout      10s;
fastcgi_send_timeout         3600s;
fastcgi_read_timeout         3600s;

# --- Buffering: keep PHP off the wire for real streaming ----------------
# X-Accel-Redirect responses bypass these because they come from a
# different location{}.
fastcgi_buffering            on;
fastcgi_buffer_size          32k;
fastcgi_buffers              16 32k;
fastcgi_busy_buffers_size    64k;
