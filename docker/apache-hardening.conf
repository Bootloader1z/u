# =====================================================================
# Fast Upload Transfer - Apache hardening
# =====================================================================

ServerTokens    Prod
ServerSignature Off
TraceEnable     Off
FileETag        None

# Only allow the HTTP verbs the app actually uses.
<Location "/">
    <LimitExcept GET POST OPTIONS HEAD>
        Require all denied
    </LimitExcept>
</Location>

# Block dotfiles, VCS, build metadata, composer files, Docker files.
<FilesMatch "^\.">
    Require all denied
</FilesMatch>
<FilesMatch "(?i)^(composer\.(json|lock)|package(-lock)?\.json|Dockerfile|docker-compose\.ya?ml|\.env.*|\.git.*|Readme\.md)$">
    Require all denied
</FilesMatch>

# Deny source / dependency / internal dirs at any depth.
<DirectoryMatch "^/var/www/html/(vendor|docker|\.git|\.vscode|\.kiro|\.github)(/|$)">
    Require all denied
</DirectoryMatch>

# Protect runtime state dirs from direct HTTP access.
<DirectoryMatch "^/var/www/html/(chunks|rate_limits)(/|$)">
    Require all denied
</DirectoryMatch>

# Global security headers (in addition to those set by upload.php).
<IfModule mod_headers.c>
    Header always set X-Content-Type-Options        "nosniff"
    Header always set X-Frame-Options               "DENY"
    Header always set Referrer-Policy               "strict-origin-when-cross-origin"
    Header always set Permissions-Policy            "geolocation=(), microphone=(), camera=(), payment=()"
    Header always set Cross-Origin-Opener-Policy    "same-origin"
    Header always set Cross-Origin-Resource-Policy  "same-site"
    Header always unset X-Powered-By
    Header always unset Server
</IfModule>

# Reasonable connection limits.
Timeout               600
KeepAlive             On
KeepAliveTimeout      5
MaxKeepAliveRequests  100
LimitRequestFields    100
LimitRequestFieldSize 8190
