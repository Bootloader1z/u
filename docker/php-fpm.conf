# =====================================================================
# Fast Upload Transfer - PHP-FPM pool overrides
# =====================================================================
[www]

user  = www-data
group = www-data

listen = 0.0.0.0:9000
listen.backlog = 1024

; Dynamic pool. Tune for the host; values below are safe on 2 CPU / 2 GB.
pm                       = dynamic
pm.max_children          = 24
pm.start_servers         = 4
pm.min_spare_servers     = 2
pm.max_spare_servers     = 8
pm.max_requests          = 500
pm.process_idle_timeout  = 30s

; Worker runtime
request_terminate_timeout = 0
; slowlog is disabled by default (requires a writable file). Enable by
; mounting a tmpfs or volume at /tmp and setting slowlog = /tmp/slow.log
; request_slowlog_timeout = 30s
; slowlog                 = /tmp/php-fpm-slow.log

; Error logging to the container stderr so `docker logs` sees it.
catch_workers_output     = yes
decorate_workers_output  = no
access.log               = /proc/self/fd/2
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; Re-apply the critical hardening at pool level (defense-in-depth;
; the main php.ini already sets these).
php_admin_value[disable_functions] = exec,shell_exec,system,passthru,proc_open,popen,proc_close,proc_terminate,proc_get_status,proc_nice,pcntl_exec,pcntl_fork,pcntl_waitpid,pcntl_signal,posix_kill,posix_setuid,posix_setgid,posix_setsid,dl,show_source,phpinfo,symlink,link,putenv
php_admin_value[open_basedir]      = /var/www/html:/tmp:/usr/local/lib/php
php_admin_flag[allow_url_fopen]    = off
php_admin_flag[allow_url_include]  = off
php_admin_flag[expose_php]         = off

; Clear env so the worker only sees vars we explicitly pass through.
clear_env = yes
env[TZ]   = $TZ
