# =====================================================================
# Fast Upload Transfer - PHP-FPM pool override
# Replaces the default /usr/local/etc/php-fpm.d/www.conf shipped in the
# image. Keep this self-contained (no [global] section; the master uses
# /usr/local/etc/php-fpm.conf which already sets error_log to stderr
# and daemonize=no via zz-docker.conf).
# =====================================================================

[www]

user  = www-data
group = www-data

listen       = 0.0.0.0:9000
listen.backlog = 1024

; Dynamic pool. Tune for the host; values below are safe on 2 CPU / 2 GB.
pm                       = dynamic
pm.max_children          = 24
pm.start_servers         = 4
pm.min_spare_servers     = 2
pm.max_spare_servers     = 8
pm.max_requests          = 500
pm.process_idle_timeout  = 30s

; Unlimited request time (large uploads / streaming).
request_terminate_timeout = 0

; Route all worker output to the container stderr so `docker logs`
; picks it up. Never to a file -- the root FS is read-only.
catch_workers_output     = yes
decorate_workers_output  = no
access.log               = /proc/self/fd/2
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; Defense in depth -- mirrors php.ini. `putenv` is intentionally NOT
; disabled here because PHP's internal timezone bootstrap needs it.
php_admin_value[disable_functions] = exec,shell_exec,system,passthru,proc_open,popen,proc_close,proc_terminate,proc_get_status,proc_nice,pcntl_exec,pcntl_fork,pcntl_waitpid,pcntl_signal,posix_kill,posix_setuid,posix_setgid,posix_setsid,dl,show_source,symlink,link
php_admin_flag[allow_url_fopen]    = off
php_admin_flag[allow_url_include]  = off
php_admin_flag[expose_php]         = off

; open_basedir: PHP cannot read/write outside these paths.
;   /var/www/html   -> app + vendor + uploads/chunks/rate_limits
;   /tmp            -> session / uploaded-file tmp
;   /proc/self/fd   -> needed for the log redirect to stderr
php_admin_value[open_basedir] = /var/www/html:/tmp:/proc/self/fd

; Keep PATH etc. so the `php` CLI used by the healthcheck works.
clear_env = no
env[TZ]   = UTC
