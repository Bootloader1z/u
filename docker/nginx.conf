# =====================================================================
# Fast Upload Transfer - nginx main config
# =====================================================================
worker_processes  auto;
pid               /tmp/nginx.pid;
user              www-data www-data;

events {
    worker_connections 4096;
    multi_accept       on;
    use                epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Temp/cache paths inside writable tmpfs (see compose) --------
    client_body_temp_path /var/cache/nginx/client_temp;
    proxy_temp_path       /var/cache/nginx/proxy_temp;
    fastcgi_temp_path     /var/cache/nginx/fastcgi_temp;
    uwsgi_temp_path       /var/cache/nginx/uwsgi_temp;
    scgi_temp_path        /var/cache/nginx/scgi_temp;

    # ---- Info leakage / tokens ---------------------------------------
    server_tokens off;

    # ---- Performance for large file I/O ------------------------------
    # sendfile + page cache is fastest for most mixed workloads; aio/
    # directio need a custom nginx build on Alpine and can hurt hit
    # rates on repeated reads.
    sendfile            on;
    sendfile_max_chunk  2m;
    tcp_nopush          on;
    tcp_nodelay         on;
    output_buffers      2 1m;

    keepalive_timeout     65;
    keepalive_requests    1000;
    reset_timedout_connection on;

    types_hash_max_size   2048;
    server_names_hash_bucket_size 64;

    # ---- Body / upload buffering ------------------------------------
    # Chunks are <= 20MB; header allows 64MB with headroom. Temp-file
    # based body read lets PHP open the uploaded chunk directly.
    client_max_body_size        64m;
    client_body_buffer_size     256k;
    client_header_buffer_size   4k;
    large_client_header_buffers 4 16k;
    client_body_timeout         300s;
    client_header_timeout       60s;
    send_timeout                300s;

    # ---- Logging (json, rotated by Docker) ---------------------------
    log_format  main  escape=json
        '{"time":"$time_iso8601","remote":"$remote_addr",'
        '"method":"$request_method","uri":"$request_uri",'
        '"status":$status,"bytes":$body_bytes_sent,'
        '"referer":"$http_referer","ua":"$http_user_agent",'
        '"rt":$request_time,"upstream_rt":"$upstream_response_time"}';

    access_log  /dev/stdout  main  buffer=32k  flush=5s;
    error_log   /dev/stderr  warn;

    # ---- Rate-limit zones (defense-in-depth; the app also limits) ----
    limit_req_zone  $binary_remote_addr  zone=api:10m   rate=30r/s;
    limit_conn_zone $binary_remote_addr  zone=perip:10m;

    # ---- Gzip text only (never for streamed binaries) ----------------
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   5;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml image/svg+xml;

    include /etc/nginx/conf.d/*.conf;
}
