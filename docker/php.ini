; =====================================================================
; Fast Upload Transfer - Hardened PHP configuration
; =====================================================================

; -------- Resource / upload limits (chunks are <= 20 MB) -------------
upload_max_filesize = 256M
post_max_size       = 256M
memory_limit        = 512M
max_execution_time  = 0
max_input_time      = 0
max_input_vars      = 3000
output_buffering    = Off
file_uploads        = On
max_file_uploads    = 50
default_socket_timeout = 60

; -------- Info leakage -----------------------------------------------
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
; Worker output routes to stderr and docker logs.
error_log = /proc/self/fd/2
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; -------- Dangerous features off -------------------------------------
allow_url_fopen   = Off
allow_url_include = Off
enable_dl         = Off
; CVE-2019-11043 class bugs -- disable pathinfo fixup.
cgi.fix_pathinfo  = 0

; Disable code-execution and process-control primitives.
; Carbon / app do not use any of these.
; `putenv` left enabled (timezone bootstrap), `phpinfo` left enabled
; (useful for inspection inside a running container).
disable_functions = exec,shell_exec,system,passthru,proc_open,popen,proc_close,proc_terminate,proc_get_status,proc_nice,pcntl_exec,pcntl_fork,pcntl_waitpid,pcntl_signal,posix_kill,posix_setuid,posix_setgid,posix_setsid,dl,show_source,symlink,link

; -------- Filesystem sandbox (pool-level copy is authoritative) ------
; Kept loose here because this file is also loaded by the `php` CLI
; used in the docker healthcheck and one-off commands. The php-fpm
; pool re-applies a stricter open_basedir for web workers.
open_basedir = /var/www/html:/tmp:/proc/self/fd

; -------- Sessions (defense-in-depth even if unused) -----------------
session.use_strict_mode   = 1
session.use_only_cookies  = 1
session.cookie_httponly   = 1
session.cookie_samesite   = "Strict"
; Only set Secure when you front this with TLS.
session.cookie_secure     = 0
session.sid_length        = 64
session.sid_bits_per_character = 6

; -------- Opcache for throughput -------------------------------------
opcache.enable                  = 1
opcache.enable_cli              = 0
opcache.memory_consumption      = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 10000
opcache.validate_timestamps     = 1
opcache.revalidate_freq         = 2
; JIT can be a footgun on Alpine / older kernels; keep off by default.
opcache.jit                     = 0
opcache.jit_buffer_size         = 0

; -------- Misc -------------------------------------------------------
realpath_cache_size = 4096K
realpath_cache_ttl  = 600
date.timezone       = UTC
