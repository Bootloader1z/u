# =====================================================================
# Fast Upload Transfer - virtual host
# =====================================================================
upstream php_fpm {
    server app:9000 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

server {
    listen      8080 default_server;
    listen      [::]:8080 default_server;
    server_name _;

    root        /var/www/html;
    index       index.html;

    include     /etc/nginx/snippets/security.conf;

    # ---- Per-IP caps ------------------------------------------------
    limit_conn perip 32;

    # -----------------------------------------------------------------
    # Internal-only endpoint used by PHP for accelerated file delivery.
    # PHP emits:   X-Accel-Redirect: /__send/<relative-path>
    # nginx then streams the real file from /var/www/html/s/ with
    # sendfile(), supporting Range requests natively.
    # -----------------------------------------------------------------
    location /__send/ {
        internal;
        alias /var/www/html/s/;

        add_header Accept-Ranges bytes always;
        add_header X-Content-Type-Options nosniff always;

        # Let PHP decide Content-Type / Content-Disposition.
        sendfile            on;
        sendfile_max_chunk  2m;
        tcp_nopush          on;
        output_buffers      2 1m;
    }

    # -----------------------------------------------------------------
    # Everything the app considers "private" is denied at the edge.
    # -----------------------------------------------------------------
    location ~ ^/(s|chunks|rate_limits|vendor|docker|logs)(/|$) {
        return 403;
    }
    location ~ ^/\. {
        return 403;
    }
    location ~* \.(log|md|lock|sh|sql|bak|ini|yaml|yml|env)$ {
        return 403;
    }
    location ~* (^|/)(composer\.(json|lock)|package(-lock)?\.json|Dockerfile(\..*)?|docker-compose\.ya?ml|Readme\.md)$ {
        return 403;
    }

    # -----------------------------------------------------------------
    # PHP endpoints. Only the two app entry points are exposed.
    # -----------------------------------------------------------------
    location = /upload.php {
        limit_req zone=api burst=60 nodelay;
        include /etc/nginx/snippets/fastcgi_php.conf;
    }

    location = /stream.php {
        # Streaming can be long-running; no rate limit here.
        include /etc/nginx/snippets/fastcgi_php.conf;
    }

    # Block any other *.php file from being executed or served.
    location ~ \.php$ {
        return 404;
    }

    # -----------------------------------------------------------------
    # Static assets
    # -----------------------------------------------------------------
    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;

        # Cache static assets; never cache html.
        location ~* \.(css|js|svg|woff2?|ttf|eot|ico)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }
    }

    # -----------------------------------------------------------------
    # Error pages: rely on nginx defaults. An internal redirect that
    # `return 200`s would clobber 4xx/5xx status codes.
    # -----------------------------------------------------------------
}
